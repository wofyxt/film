<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - FILM</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Шапка -->
  <header class="header">
    <a href="/" class="logo">Film<span>Rec</span></a>
    <nav class="nav">
      <a href="/index.html">Главная</a>
    </nav>
  </header>

  <!-- Контейнер регистрации -->
  <div class="auth-container">
    <h2 class="auth-title">Регистрация</h2>
    
    <div id="alert" class="alert"></div>

    <form id="registerForm" novalidate>
  <div class="form-group">
    <label for="username">Имя пользователя</label>
    <input type="text" id="username" placeholder="Придумайте никнейм" required minlength="3" aria-describedby="usernameError">
    <div id="usernameError" class="error-message visually-hidden" aria-live="polite"></div>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="example@mail.ru" required aria-describedby="emailError">
    <div id="emailError" class="error-message visually-hidden" aria-live="polite"></div>
  </div>

  <div class="form-group">
    <label for="password">Пароль</label>
    <input type="password" id="password" placeholder="Минимум 6 символов" required minlength="6" aria-describedby="passwordError">
    <div id="passwordError" class="error-message visually-hidden" aria-live="polite"></div>
  </div>

  <button type="submit" class="btn">Зарегистрироваться</button>
</form>
    <div class="auth-footer">
      <p>Уже есть аккаунт? <a href="/login.html">Войти</a></p>
    </div>
  </div>

  <script src="/js/auth.service.js"></script>
  <script>
    // ✅ ИСПРАВЛЕНО: используем функцию register() из auth.service.js
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // ✅ Вызываем функцию из auth.service.js
      await register(username, email, password);
    });
    
  </script>
</body>
</html>

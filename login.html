<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - FILM</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/accessibility.js"></script>
</head>
<body>
  <!-- Шапка -->
  <header class="header">
    <a href="/" class="logo">Film<span>Rec</span></a>
    <nav class="nav">
      <a href="/index.html">Главная</a>
    </nav>
    <button class="accessibility-toggle" aria-label="Версия для слабовидящих" title="Версия для слабовидящих">👁️</button>
  </header>

  <!-- Контейнер входа -->
  <div class="auth-container">
    <h2 class="auth-title">Вход</h2>
    
    <div id="alert" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="example@mail.ru" required>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль" required>
      </div>

      <button type="submit" class="btn">Войти</button>
    </form>

    <div class="auth-footer">
      <p>Нет аккаунта? <a href="/register.html">Зарегистрироваться</a></p>
    </div>
  </div>

  <script src="/js/auth.service.js"></script>
  <script>
    // ✅ ИСПРАВЛЕНО: используем функцию login() из auth.service.js
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // ✅ Вызываем функцию из auth.service.js
      await login(email, password);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Страница фильма">
  <title id="pageTitle">FILMHUB</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header" role="banner">
    <a href="/" class="logo">FILM<span>HUB</span></a>
    <nav class="site-nav" aria-label="Основная навигация">
      <ul class="nav-list">
        <li><a href="/index.html" class="nav-link">Каталог</a></li>
        <li><a href="/lists.html" class="nav-link">Мои списки</a></li>
        <li><a href="/login.html" class="nav-link" id="authLink">Войти</a></li>
      </ul>
    </nav>
    <button class="menu-toggle" aria-label="Меню">☰</button>
  </header>

  <main class="movie-detail" role="main" aria-label="Информация о фильме" id="movieDetail">
    <article class="movie-article" itemscope itemtype="https://schema.org/Movie">
      <header class="movie-header">
        <figure class="movie-poster">
          <img 
            id="moviePoster" 
            src="" 
            alt="" 
            itemprop="image"
            loading="lazy"
          />
          <figcaption class="visually-hidden">Постер фильма</figcaption>
        </figure>
        
        <div class="movie-meta">
          <h1 id="movieTitle" itemprop="name"></h1>
          
          <dl class="movie-info">
            <div class="info-row">
              <dt>Год:</dt>
              <dd id="movieYear" itemprop="dateCreated"></dd>
            </div>
            <div class="info-row">
              <dt>Жанр:</dt>
              <dd id="movieGenre" itemprop="genre"></dd>
            </div>
            <div class="info-row">
              <dt>Рейтинг:</dt>
              <dd id="movieRating" itemprop="aggregateRating" itemscope itemtype="https://schema.org/AggregateRating">
                <span itemprop="ratingValue"></span>/<span itemprop="bestRating">10</span>
              </dd>
            </div>
          </dl>
          
          <p id="movieDescription" class="movie-description" itemprop="description"></p>
          
          <div class="movie-actions">
            <button class="btn btn-primary" id="watchTrailer" aria-label="Смотреть трейлер">
              ▶ Трейлер
            </button>
            <button class="btn btn-outline" id="addToWatchlist" aria-label="Добавить в список буду смотреть">
              + Буду смотреть
            </button>
            <button class="btn btn-outline" id="addToFavorites" aria-label="Добавить в избранное">
              ❤ В избранное
            </button>
          </div>
        </div>
      </header>
      
      <!-- Трейлер (скрыт по умолчанию) -->
      <section id="trailerSection" class="movie-trailer" hidden aria-label="Трейлер фильма">
        <h2>Трейлер</h2>
        <div id="trailerContainer"></div>
      </section>
      
      <!-- Отзывы -->
      <section class="reviews-section" aria-label="Отзывы и оценки">
        <h2>Отзывы</h2>
        
        <!-- Форма отзыва (только для авторизованных) -->
        <form id="reviewForm" class="review-form" hidden>
          <h3>Оставить отзыв</h3>
          
          <fieldset>
            <legend>Ваша оценка</legend>
            <label for="ratingInput" class="visually-hidden">Оценка от 1 до 10</label>
            <select id="ratingInput" name="rating" required>
              <option value="">Выберите оценку</option>
              <option value="10">10 ★ Отлично</option>
              <option value="9">9 ★</option>
              <option value="8">8 ★ Хорошо</option>
              <option value="7">7 ★</option>
              <option value="6">6 ★ Нормально</option>
              <option value="5">5 ★</option>
              <option value="4">4 ★</option>
              <option value="3">3 ★</option>
              <option value="2">2 ★</option>
              <option value="1">1 ★ Плохо</option>
            </select>
          </fieldset>
          
          <label for="reviewInput">Ваш отзыв</label>
          <textarea 
            id="reviewInput" 
            name="review" 
            placeholder="Поделитесь впечатлениями..." 
            rows="4"
            maxlength="500"
          ></textarea>
          
          <button type="submit" class="btn btn-primary">Отправить отзыв</button>
        </form>
        
        <!-- Список отзывов -->
        <div id="reviewsList" class="reviews-list" aria-live="polite"></div>
      </section>
    </article>
  </main>

  <footer class="site-footer" role="contentinfo">
    <p>&copy; 2024 FILMHUB</p>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.service.js"></script>
  <script src="/js/movie.js"></script>
</body>
</html>
